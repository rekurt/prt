name: Feature Request
description: Suggest a new feature or improvement for prt
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for prt? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I often need to... but currently prt doesn't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like it to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of prt does this relate to?
      options:
        - TUI / display
        - Scanning / detection
        - Filtering / search
        - Export (JSON / CSV / NDJSON)
        - Alerts / notifications
        - Firewall / security
        - Container support
        - Platform support
        - Configuration
        - CLI / flags
        - i18n / languages
        - Other

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
